# Render Blueprint — Bochile Web (Vite + React, sitio estático)
# Deploy: en Render → New + → Blueprint → conectar el repo WEB_BOCHILE → Apply.
# Cada push a `main` redeploya solo.
services:
  - type: web
    name: bochile-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    # Node 20 para Vite 5
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Supabase — cargá los valores en el dashboard de Render (Environment).
      # La anon key es pública por diseño (la seguridad la da RLS). NUNCA pongas
      # acá la service_role key: esa solo se usa local para la migración.
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
    # SPA: cualquier ruta que no sea un archivo real cae en index.html
    # (sin esto, entrar/refrescar en /propiedades o /propiedad/:slug da 404)
    # OJO: NO agregar acá una regla /propiedad/* → /propiedad/:splat/...  porque
    # el destino vuelve a matchear /propiedad/* y loopea (pantalla en blanco / too
    # many redirects). El preview por propiedad se resuelve por otro lado (links con
    # barra final, que Render sirve como archivo estático sin necesidad de regla).
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # Los assets de Vite llevan hash en el nombre → cache larga segura
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
