# Render Blueprint — Bochile Web (Vite + React, sitio estático)
# Deploy: en Render → New + → Blueprint → conectar el repo WEB_BOCHILE → Apply.
# Cada push a `main` redeploya solo.
services:
  - type: web
    name: bochile-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    # Node 20 para Vite 5
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Supabase — cargá los valores en el dashboard de Render (Environment).
      # La anon key es pública por diseño (la seguridad la da RLS). NUNCA pongas
      # acá la service_role key: esa solo se usa local para la migración.
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
    # El link de una propiedad se comparte SIN barra final (/propiedad/<slug>).
    # Render no resuelve solo esa forma (cae en el rewrite SPA → preview genérico de
    # la home), así que la redirigimos a la forma CON barra, que sí sirve el HTML
    # pre-renderizado con el Open Graph propio (logo + título + precio de esa ficha).
    # Las propiedades nuevas sin pre-render caen igual en la SPA (no se rompen).
    # IMPORTANTE: esta regla va ANTES del catch-all (se evalúan en orden).
    routes:
      - type: redirect
        source: /propiedad/*
        destination: /propiedad/:splat/
      # SPA: cualquier ruta que no sea un archivo real cae en index.html
      # (sin esto, entrar/refrescar en /propiedades o /propiedad/:slug da 404)
      - type: rewrite
        source: /*
        destination: /index.html
    # Los assets de Vite llevan hash en el nombre → cache larga segura
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
